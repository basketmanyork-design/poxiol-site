name: POXIOL Sanity MVP Preflight

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PREFLIGHT_ONLY to run read-only collision checks'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: poxiol-sanity-mvp-preflight
  cancel-in-progress: false

jobs:
  preflight:
    if: ${{ github.event.inputs.confirm == 'PREFLIGHT_ONLY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (sanity-admin-mvp branch)
        uses: actions/checkout@v4
        with:
          ref: sanity-admin-mvp
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify secret exists
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_MVP_SEED_TOKEN }}
        run: |
          if [ -z "${SANITY_AUTH_TOKEN:-}" ]; then
            echo "::error::SANITY_MVP_SEED_TOKEN is not configured"
            exit 1
          fi

      - name: Install Studio dependencies
        working-directory: studio
        run: npm ci --legacy-peer-deps

      - name: Validate Studio build
        working-directory: studio
        run: npm run build

      - name: Run read-only MVP preflight
        working-directory: studio
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_MVP_SEED_TOKEN }}
        run: ./node_modules/.bin/sanity exec scripts/preflight-mvp-seed.ts

      - name: Verify preflight result
        run: node scripts/verify-mvp-preflight-result.cjs

      - name: Upload sanitized preflight report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-mvp-preflight-result
          path: migration-output/mvp-preflight-result.json
          if-no-files-found: warn
          retention-days: 7
